spring.application.name=backend
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-stacktrace=never

spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration=86400000
app.google.client-id=${GOOGLE_CLIENT_ID:}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://crackplacement.vercel.app,https://*.vercel.app,http://localhost:5173,http://localhost:3000}
# AI Assistant
app.ai.provider=${AI_PROVIDER:gemini}
app.ai.openai-api-key=${OPENAI_API_KEY:}
app.ai.gemini-api-key=${GEMINI_API_KEY:}
app.ai.gemini-model=${GEMINI_MODEL:gemini-pro}
app.ai.model=${OPENAI_MODEL:gpt-4o-mini}
