services:
  - type: web
    name: crackplacement-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    autoDeploy: true
    healthCheckPath: /health
    
    envVars:
      - key: JAVA_OPTS
        value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: crackplacement-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: crackplacement-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: crackplacement-db
          property: database
      - key: DB_URL
        value: "jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}"
      - key: DB_USERNAME
        fromDatabase:
          name: crackplacement-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: crackplacement-db
          property: password
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "https://crackplacement.vercel.app,https://*.vercel.app,http://localhost:5173,http://localhost:3000"
      - key: AI_PROVIDER
        value: "gemini"
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SPRING_DATASOURCE_URL
        value: ${DB_URL}
      - key: SPRING_DATASOURCE_USERNAME
        value: ${DB_USERNAME}
      - key: SPRING_DATASOURCE_PASSWORD
        value: ${DB_PASSWORD}

databases:
  - name: crackplacement-db
    databaseName: crackplacement
    user: crackuser
    plan: starter
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all
